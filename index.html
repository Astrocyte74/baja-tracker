<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baja Tracker</title>
    <style>
        :root {
            --sand: #dfc392;
            --paper: rgba(252, 247, 238, 0.9);
            --ink: #2f251a;
            --muted: #786b5a;
            --line: rgba(47, 37, 26, 0.12);
            --accent: #c76030;
            --accent-deep: #8f3e1f;
            --ok: #1f7a4f;
            --warn: #9a6400;
            --info: #355f8f;
            --shadow: 0 24px 60px rgba(69, 44, 19, 0.18);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            font-family: Georgia, "Times New Roman", serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top, rgba(255, 231, 185, 0.86), transparent 34%),
                linear-gradient(180deg, #d7bc89 0%, #f5ecd9 32%, #e3cca0 100%);
        }

        main {
            width: min(100%, 980px);
            margin: 0 auto;
            padding: 18px 14px 110px;
        }

        .shell {
            border: 1px solid var(--line);
            border-radius: 28px;
            background: linear-gradient(180deg, rgba(252, 248, 240, 0.96), rgba(248, 241, 229, 0.9));
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .topbar {
            position: absolute;
            inset: 16px 16px auto 16px;
            z-index: 3;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            pointer-events: none;
        }

        .brand,
        .chip,
        .status-banner {
            pointer-events: auto;
            backdrop-filter: blur(8px);
            background: rgba(255, 252, 246, 0.82);
            border: 1px solid rgba(47, 37, 26, 0.1);
            box-shadow: 0 10px 30px rgba(69, 44, 19, 0.12);
        }

        .brand {
            padding: 10px 14px;
            border-radius: 18px;
        }

        .brand h1 {
            margin: 0;
            font-size: clamp(1.4rem, 4vw, 2.1rem);
            line-height: 1;
            letter-spacing: -0.03em;
        }

        .brand p {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 0.92rem;
        }

        .top-actions {
            display: grid;
            gap: 8px;
            justify-items: end;
        }

        .chip {
            border-radius: 999px;
            padding: 9px 12px;
            font-size: 0.86rem;
            font-weight: 700;
            color: var(--muted);
            text-decoration: none;
        }

        .map-stage {
            position: relative;
            padding: 82px 14px 14px;
        }

        .map-frame {
            position: relative;
            overflow: hidden;
            border-radius: 22px;
            border: 2px solid rgba(199, 96, 48, 0.32);
            background: rgba(255, 255, 255, 0.42);
        }

        #map-image {
            display: block;
            width: 100%;
            height: auto;
        }

        .marker {
            position: absolute;
            transform: translate(-50%, -100%);
            z-index: 2;
        }

        .marker-label {
            margin-bottom: 6px;
            padding: 6px 10px;
            border-radius: 999px;
            background: var(--accent);
            color: #fffaf6;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
            box-shadow: 0 8px 20px rgba(143, 62, 31, 0.3);
        }

        .marker-pin {
            width: 32px;
            height: 42px;
        }

        .status-banner {
            margin: 0 14px 14px;
            padding: 14px 16px;
            border-radius: 20px;
        }

        .status-banner strong {
            display: block;
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .status-banner span,
        .status-banner a {
            color: var(--muted);
            line-height: 1.45;
            text-decoration: none;
        }

        .status-banner a {
            color: #1c4f8b;
            font-weight: 700;
        }

        .attribution {
            margin: 0 14px 16px;
            padding: 0 2px;
            color: var(--muted);
            font-size: 0.88rem;
            text-align: right;
        }

        .attribution a {
            color: var(--muted);
            text-decoration: none;
            border-bottom: 1px solid rgba(47, 37, 26, 0.2);
        }

        .dock {
            position: fixed;
            left: 50%;
            bottom: 16px;
            z-index: 20;
            width: min(calc(100% - 20px), 760px);
            transform: translateX(-50%);
            border: 1px solid rgba(47, 37, 26, 0.12);
            border-radius: 26px;
            background: rgba(255, 251, 244, 0.9);
            box-shadow: 0 22px 50px rgba(69, 44, 19, 0.22);
            backdrop-filter: blur(12px);
            padding: 12px;
        }

        .dock-grid {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            align-items: center;
        }

        .dock-copy strong {
            display: block;
            font-size: 1rem;
            margin-bottom: 3px;
        }

        .dock-copy span {
            display: block;
            color: var(--muted);
            font-size: 0.92rem;
            line-height: 1.35;
        }

        .dock-buttons {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        button {
            appearance: none;
            border: 0;
            cursor: pointer;
            font: inherit;
        }

        .share-btn {
            padding: 14px 20px;
            border-radius: 999px;
            background: linear-gradient(180deg, var(--accent), var(--accent-deep));
            color: #fffaf6;
            font-weight: 700;
            white-space: nowrap;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(47, 37, 26, 0.12);
            color: var(--ink);
            font-size: 1rem;
            font-weight: 700;
        }

        .tone-ok strong {
            color: var(--ok);
        }

        .tone-warn strong {
            color: var(--warn);
        }

        .tone-info strong {
            color: var(--info);
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 700px) {
            .topbar {
                position: static;
                display: block;
                padding: 14px 14px 0;
            }

            .top-actions {
                margin-top: 10px;
                justify-items: end;
            }

            .map-stage {
                padding-top: 14px;
            }

            .dock-grid {
                grid-template-columns: 1fr;
            }

            .dock-buttons {
                width: 100%;
            }

            .share-btn {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <main>
        <section class="shell">
            <div class="topbar">
                <div class="brand">
                    <h1>Baja Tracker</h1>
                    <p id="last-updated">Tap the button to check your location</p>
                </div>

                <div class="top-actions">
                    <a id="exact-link" class="chip hidden" href="#" target="_blank" rel="noreferrer">Exact Point</a>
                </div>
            </div>

            <div class="map-stage">
                <div class="map-frame" id="map-wrapper">
                    <img id="map-image" src="MapVertical.jpg" alt="Baja California Map">
                </div>
            </div>

            <div class="status-banner tone-info" id="status-banner">
                <strong id="status-title">Ready</strong>
                <span id="status-detail">Tap Share Location to place your current position on the map.</span>
            </div>

            <div class="attribution">
                Map source: <a href="https://achoiceland.com/" target="_blank" rel="noreferrer">A Choice Land</a>
            </div>
        </section>
    </main>

    <div class="dock">
        <div class="dock-grid">
            <div class="dock-copy">
                <strong>My Location</strong>
                <span id="dock-detail">Tap to place your location on the map.</span>
            </div>

            <div class="dock-buttons">
                <button id="share-btn" class="share-btn" type="button">Show My Location</button>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            STORAGE_KEY: 'baja-tracker-local-location',
            MAP_BOUNDS: {
                north: 33.2475,
                south: 22.3387,
                west: -114.0162,
                east: -112.1601
            }
        };

        let latestLocation = null;

        const els = {
            dockDetail: document.getElementById('dock-detail'),
            exactLink: document.getElementById('exact-link'),
            lastUpdated: document.getElementById('last-updated'),
            mapImage: document.getElementById('map-image'),
            mapWrapper: document.getElementById('map-wrapper'),
            shareBtn: document.getElementById('share-btn'),
            statusBanner: document.getElementById('status-banner'),
            statusDetail: document.getElementById('status-detail'),
            statusTitle: document.getElementById('status-title')
        };

        function setStatus(title, detail, tone) {
            els.statusBanner.classList.remove('tone-ok', 'tone-warn', 'tone-info');
            els.statusBanner.classList.add(`tone-${tone}`);
            els.statusTitle.textContent = title;
            els.statusDetail.textContent = detail;
        }

        function formatTimestamp(timestamp) {
            if (!timestamp) {
                return 'Unknown';
            }

            const date = new Date(timestamp);
            const ageMs = Date.now() - date.getTime();

            if (ageMs < 60000) {
                return 'Just now';
            }

            if (ageMs < 3600000) {
                return `${Math.floor(ageMs / 60000)} min ago`;
            }

            if (ageMs < 86400000) {
                return `${Math.floor(ageMs / 3600000)} hr ago`;
            }

            return `${date.toLocaleDateString()} ${date.toLocaleTimeString()}`;
        }

        function getExactMapUrl(lat, lng) {
            return `https://www.openstreetmap.org/?mlat=${lat}&mlon=${lng}#map=11/${lat}/${lng}`;
        }

        function isInsideBaja(lat, lng) {
            return lat >= CONFIG.MAP_BOUNDS.south &&
                lat <= CONFIG.MAP_BOUNDS.north &&
                lng >= CONFIG.MAP_BOUNDS.west &&
                lng <= CONFIG.MAP_BOUNDS.east;
        }

        function latLngToPixel(lat, lng) {
            const xPercent = (lng - CONFIG.MAP_BOUNDS.west) / (CONFIG.MAP_BOUNDS.east - CONFIG.MAP_BOUNDS.west);
            const yPercent = (CONFIG.MAP_BOUNDS.north - lat) / (CONFIG.MAP_BOUNDS.north - CONFIG.MAP_BOUNDS.south);

            return {
                x: xPercent * els.mapImage.clientWidth,
                y: yPercent * els.mapImage.clientHeight
            };
        }

        function clearMarker() {
            els.mapWrapper.querySelectorAll('.marker').forEach((node) => node.remove());
        }

        function renderMarker(location) {
            clearMarker();

            if (!location || !isInsideBaja(location.lat, location.lng)) {
                return;
            }

            const pos = latLngToPixel(location.lat, location.lng);
            const marker = document.createElement('div');
            marker.className = 'marker';
            marker.style.left = `${pos.x}px`;
            marker.style.top = `${pos.y}px`;
            marker.innerHTML = `
                <div class="marker-label">You</div>
                <svg class="marker-pin" viewBox="0 0 30 40" aria-hidden="true">
                    <path d="M15 0C6.7 0 0 6.7 0 15c0 11 15 25 15 25s15-14 15-25C30 6.7 23.3 0 15 0z" fill="#c76030"></path>
                    <circle cx="15" cy="14" r="7" fill="white"></circle>
                </svg>
            `;
            els.mapWrapper.appendChild(marker);
        }

        function readSavedLocation() {
            try {
                return JSON.parse(localStorage.getItem(CONFIG.STORAGE_KEY)) || null;
            } catch (error) {
                return null;
            }
        }

        function saveLocation(location) {
            localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(location));
        }

        function renderLocation(location) {
            latestLocation = location;
            renderMarker(location);

            if (!location) {
                els.lastUpdated.textContent = 'Tap the button to check your location';
                els.dockDetail.textContent = 'Tap to place your location on the map.';
                els.exactLink.classList.add('hidden');
                setStatus('Ready', 'Tap Show My Location to place your current position on the map.', 'info');
                return;
            }

            els.lastUpdated.textContent = `Updated ${formatTimestamp(location.timestamp)}`;

            if (isInsideBaja(location.lat, location.lng)) {
                els.dockDetail.textContent = 'Your current spot is on the Baja map.';
                els.exactLink.classList.add('hidden');
                setStatus('Pin placed on the map', `Saved at ${location.lat.toFixed(5)}, ${location.lng.toFixed(5)}.`, 'ok');
            } else {
                els.dockDetail.textContent = 'Your saved spot is outside Baja.';
                els.exactLink.href = getExactMapUrl(location.lat, location.lng);
                els.exactLink.classList.remove('hidden');
                setStatus('Outside the Baja map bounds', 'Your location was captured, but this image only shows points inside Baja. Exact Point opens the live coordinates.', 'warn');
            }
        }

        function refreshSavedLocation() {
            renderLocation(readSavedLocation());
        }

        function shareCurrentLocation() {
            if (!navigator.geolocation) {
                setStatus('Unavailable', 'This browser cannot read location.', 'warn');
                return;
            }

            els.shareBtn.disabled = true;
            els.shareBtn.textContent = 'Locating...';
            setStatus('Getting current location', 'Allow location access if the phone asks.', 'info');

            navigator.geolocation.getCurrentPosition((position) => {
                const payload = {
                    lat: position.coords.latitude,
                    lng: position.coords.longitude,
                    timestamp: new Date().toISOString(),
                    accuracy: Math.round(position.coords.accuracy)
                };

                saveLocation(payload);
                renderLocation(payload);

                if (isInsideBaja(payload.lat, payload.lng)) {
                    setStatus('Location saved', `Accuracy about ${payload.accuracy} meters. The pin above is your current location.`, 'ok');
                } else {
                    setStatus('Location saved', `Accuracy about ${payload.accuracy} meters. Your spot is outside Baja, so the map image cannot place the pin.`, 'warn');
                }

                els.shareBtn.disabled = false;
                els.shareBtn.textContent = 'Show My Location';
            }, (error) => {
                const message = error.code === error.PERMISSION_DENIED
                    ? 'Location permission was denied.'
                    : 'Could not get the current location.';

                setStatus('Location failed', message, 'warn');
                els.shareBtn.disabled = false;
                els.shareBtn.textContent = 'Show My Location';
            }, {
                enableHighAccuracy: true,
                timeout: 20000,
                maximumAge: 60000
            });
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(() => {
                    // Offline support is best-effort; location lookups still work without the worker once loaded.
                });
            });
        }

        renderLocation(readSavedLocation());

        els.mapImage.addEventListener('load', () => renderMarker(latestLocation));
        window.addEventListener('resize', () => renderMarker(latestLocation));
        els.shareBtn.addEventListener('click', shareCurrentLocation);
    </script>
</body>
</html>
